spring:
  application:
    name: avip-platform-worker
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5433/avip}
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:postgres}
  flyway:
    enabled: false

avip:
  internal-secret: ${AVIP_INTERNAL_SIGNAL_SECRET:dev-internal-secret-change-me}
  app-url: ${APP_URL:}
  token-encryption-key: ${TOKEN_ENCRYPTION_KEY:${SHOPIFY_API_SECRET:}}
  default-language: ${DEFAULT_LANGUAGE:hi-IN}
  shopify-api-version: ${SHOPIFY_API_VERSION:2024-10}
  temporal:
    address: ${TEMPORAL_ADDRESS:localhost:7233}
    namespace: ${TEMPORAL_NAMESPACE:default}
    task-queue: ${TEMPORAL_TASK_QUEUE:avip-main}
  livekit:
    url: ${LIVEKIT_URL:}
    api-url: ${LIVEKIT_API_URL:}
    api-key: ${LIVEKIT_API_KEY:}
    api-secret: ${LIVEKIT_API_SECRET:}
    agent-name: ${LIVEKIT_AGENT_NAME:avip-recovery-agent}
    sip-outbound-trunk-id: ${LIVEKIT_SIP_OUTBOUND_TRUNK_ID:}
    sip-wait-until-answered: ${LIVEKIT_SIP_WAIT_UNTIL_ANSWERED:false}
  telephony:
    provider: ${TELEPHONY_PROVIDER:vobiz}

logging:
  level:
    com.vedanova.platform: INFO
